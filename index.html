<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>兵營生產線視覺化</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .control-panel {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #startBtn { background-color: #2ecc71; color: white; }
        #startBtn:hover { background-color: #27ae60; }
        #resetBtn { background-color: #e74c3c; color: white; }
        #resetBtn:hover { background-color: #c0392b; }
        button:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; }
        
        .status-bar {
            font-size: 18px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 20px;
        }
        .gold-count { color: #f1c40f; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }

        .dashboard {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 900px;
        }
        .simulation, .log-panel {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 300px;
        }
        .barracks-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .barracks {
            border: 2px dashed #34495e;
            border-radius: 8px;
            padding: 15px;
            background: #ecf0f1;
            position: relative;
        }
        .barracks h3 { margin-top: 0; color: #2c3e50; }
        .queue {
            display: flex;
            gap: 10px;
            min-height: 60px;
            align-items: center;
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #bdc3c7;
        }
        .unit-card {
            background: #3498db;
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            animation: slideIn 0.3s ease-out;
        }
        .unit-card.completed {
            background: #2ecc71;
        }
        .log-panel h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px;}
        #logText {
            height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        .log-round { font-weight: bold; color: #9b59b6; margin-top: 5px; }
        .log-success { color: #27ae60; }
        .log-danger { color: #c0392b; }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>HW3-1 兵營生產線系統</h1>
    
    <div class="control-panel">
        <button id="startBtn" onclick="startSimulation()">開始模擬</button>
        <button id="resetBtn" onclick="resetSimulation()">重製系統</button>
        <label for="speedRange">加分項：延遲時間 (0~1秒): </label>
        <input type="range" id="speedRange" min="0" max="1" step="0.1" value="0.5" oninput="updateSpeedLabel(this.value)">
        <span id="speedLabel">0.5s</span>
    </div>

    <div class="status-bar">
        玩家剩餘黃金: <span id="goldVal" class="gold-count">150</span> G
    </div>

    <div class="dashboard">
        <div class="simulation">
            <div class="barracks-container">
                <div class="barracks" id="bxA">
                    <h3>兵營 A (上限 2)</h3>
                    <div class="queue" id="queueA"></div>
                </div>
                <div class="barracks" id="bxB">
                    <h3>兵營 B (上限 2)</h3>
                    <div class="queue" id="queueB"></div>
                </div>
            </div>
        </div>

        <div class="log-panel">
            <h3>系統終端日誌</h3>
            <div id="logText">系統準備就緒。點擊「開始模擬」...</div>
        </div>
    </div>

    <script>
        // 初始化原始資料
        const originalOrders = [
            {unit: "劍士", cost: 20},
            {unit: "弓手", cost: 30},
            {unit: "騎士", cost: 50},
            {unit: "投石車", cost: 40}
        ];

        let playerGold = 150;
        let barracksA = [];
        let barracksB = [];
        let currentRound = 0;
        let isRunning = false;
        let delayTime = 500; // 毫秒

        function updateSpeedLabel(val) {
            document.getElementById('speedLabel').innerText = val + 's';
            delayTime = val * 1000;
        }

        function appendLog(htmlText) {
            const logText = document.getElementById('logText');
            logText.innerHTML += htmlText + "<br>";
            logText.scrollTop = logText.scrollHeight;
        }

        function drawUI() {
            document.getElementById('goldVal').innerText = playerGold;
            
            // 繪製 A 廠
            const qA = document.getElementById('queueA');
            qA.innerHTML = barracksA.map(u => `<div class="unit-card">${u}</div>`).join('');
            
            // 繪製 B 廠
            const qB = document.getElementById('queueB');
            qB.innerHTML = barracksB.map(u => `<div class="unit-card">${u}</div>`).join('');
        }

        function resetSimulation() {
            playerGold = 150;
            barracksA = [];
            barracksB = [];
            currentRound = 0;
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('logText').innerHTML = "系統已重製。";
            drawUI();
        }

        // 用 async/await 配合 Promise 來製造動態停頓效果
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startSimulation() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('logText').innerHTML = "";

            for (let round = 0; round < originalOrders.length; round++) {
                if (!isRunning) break;
                
                appendLog(`<div class="log-round">--- 第 ${round} 回合 ---</div>`);
                
                // 1. 生產階段 (偶數回合)
                if (round % 2 === 0) {
                    if (barracksA.length !== 0) {
                        let toprint = barracksA.shift(); // 模擬 popleft
                        appendLog(`<span class="log-success">A廠生產完成: ${toprint}</span>`);
                    } else {
                        appendLog("A廠沒有東西做");
                    }
                    
                    if (barracksB.length !== 0) {
                        let toprint = barracksB.shift(); // 模擬 popleft
                        appendLog(`<span class="log-success">B廠生產完成: ${toprint}</span>`);
                    } else {
                        appendLog("B廠沒有東西做");
                    }
                    drawUI();
                    await sleep(delayTime); // 根據滑桿決定停頓時間
                }

                // 2. 訂單派發階段
                let order = originalOrders[round];
                
                if (order.cost <= playerGold) {
                    playerGold -= order.cost;

                    // 負載平衡決策邏輯
                    if (barracksA.length > barracksB.length) {
                        if (barracksB.length < 2) {
                            barracksB.push(order.unit);
                            appendLog(`${order.unit} 分到 B 廠，剩 ${playerGold} 元`);
                        } else {
                            appendLog(`<span class="log-danger">產線已滿，[unit, cost] 訂單拒絕</span>`);
                        }
                    } else { // len(A) <= len(B)
                        if (barracksA.length < 2) {
                            barracksA.push(order.unit);
                            appendLog(`${order.unit} 分到 A 廠，剩 ${playerGold} 元`);
                        } else {
                            appendLog(`<span class="log-danger">產線已滿，[unit, cost] 訂單拒絕</span>`);
                        }
                    }
                } else {
                    appendLog(`<span class="log-danger">金錢不足以購買 ${order.unit} (需 ${order.cost}G)</span>`);
                }

                // 顯示目前佇列狀態
                appendLog(`<b>A:</b> [${barracksA.join(', ')}] | <b>B:</b> [${barracksB.join(', ')}]`);
                drawUI();
                
                await sleep(delayTime);
            }
            
            appendLog("<br><b>模擬結束！</b>");
            isRunning = false;
        }
    </script>
</body>
</html>
